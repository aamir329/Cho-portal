<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crescent Heights Oyo – Student Portal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#162539;
  color:#fff;
  text-align:center;
  padding:30px;
}
.container{
  background:#fff;
  color:#000;
  padding:25px;
  border-radius:8px;
  max-width:600px;
  margin:auto;
}
input,button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:4px;
  border:1px solid #ccc;
}
button{
  background:#0b3c5d;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{background:#145a86}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}
th{background:#0b3c5d;color:#fff}
img{width:120px;border-radius:6px;margin:10px 0;}
</style>
</head>

<body>

<h2>Crescent Heights Oyo – Student Portal</h2>

<div class="container">

<input id="matricInput" placeholder="Enter Matric Number">
<button onclick="checkResult()">Check Result</button>

<div id="resultArea" style="display:none; margin-top:20px;">

<h3 id="studentName"></h3>
<p id="studentClass"></p>
<p id="studentSession"></p>
<img id="studentPassport">
<table id="resultTable"></table>

<button onclick="printPDF()" style="margin-top:15px;">Print Result (PDF)</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyGAAiybGdSQZvsJnzK46fUtCMmcVwhP0",
  authDomain: "crescent-heights-oyo.firebaseapp.com",
  projectId: "crescent-heights-oyo",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentStudent=null;

window.checkResult = async function(){
  const matric = matricInput.value.trim();
  if(!matric) return alert("Enter matric number");

  const q = query(collection(db,"students"), where("matric","==",matric));
  const snapshot = await getDocs(q);

  if(snapshot.empty) return alert("Student not found");

  snapshot.forEach(docSnap=>{
    const s = docSnap.data();
    currentStudent = s;

    studentName.innerText = s.name;
    studentClass.innerText = "Class: "+s.class;
    studentSession.innerText = s.term+" | "+s.session;
    studentPassport.src = s.passport;

    resultTable.innerHTML="<tr><th>Subject</th><th>Score</th></tr>";
    s.results.forEach(r=>{
      resultTable.innerHTML+=`
      <tr>
        <td>${r.subject}</td>
        <td>${r.score}</td>
      </tr>`;
    });

    resultArea.style.display="block";
  });
}

function calculateAverage(results){
  if(!results.length) return 0;
  return (results.reduce((a,b)=>a+b.score,0)/results.length).toFixed(1);
}

function grade(avg){
  if(avg>=70) return "A";
  if(avg>=60) return "B";
  if(avg>=50) return "C";
  if(avg>=45) return "D";
  return "F";
}

function remark(avg){
  if(avg>=70) return "Excellent";
  if(avg>=60) return "Very Good";
  if(avg>=50) return "Good";
  if(avg>=45) return "Pass";
  return "Fail";
}

window.printPDF = async function(){

  if(!currentStudent) return alert("No result loaded");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  // ADD WATERMARK
  try {
    const watermarkImg = await fetch("A_digital_graphic_design_features_the_Crescent_Hei.png")
      .then(res => res.blob())
      .then(blob => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      }));

    // Use semi-transparent watermark
    doc.setGState(new doc.GState({ opacity: 0.1 }));
    doc.addImage(watermarkImg, "PNG", 35, 80, 140, 140, undefined, "FAST");
    doc.setGState(new doc.GState({ opacity: 1 }));
  } catch(e){
    console.log("Watermark not loaded", e);
  }

  // SCHOOL HEADER
  doc.setFontSize(16);
  doc.text("Crescent Heights Oyo", 60, y);
  y+=10;
  doc.setFontSize(12);
  doc.text("Student Result Slip", 75, y);
  y+=15;

  // STUDENT INFO
  doc.text("Name: "+currentStudent.name,20,y); y+=8;
  doc.text("Matric: "+currentStudent.matric,20,y); y+=8;
  doc.text("Class: "+currentStudent.class,20,y); y+=8;
  doc.text("Session: "+currentStudent.session,20,y); y+=15;

  // PASSPORT
  try{
    const img = await fetch(currentStudent.passport)
      .then(res=>res.blob())
      .then(blob=>new Promise(resolve=>{
        const reader=new FileReader();
        reader.onload=()=>resolve(reader.result);
        reader.readAsDataURL(blob);
      }));
    doc.addImage(img,"JPEG",150,20,40,40);
  }catch(e){}

  // TABLE
  doc.text("Subjects & Scores:",20,y);
  y+=10;

  currentStudent.results.forEach(r=>{
    doc.text(r.subject+" - "+r.score,25,y);
    y+=8;
  });

  // AVERAGE + GRADE
  const avg = calculateAverage(currentStudent.results);
  y+=10;
  doc.text("Average: "+avg,20,y); y+=8;
  doc.text("Grade: "+grade(avg),20,y); y+=8;
  doc.text("Remark: "+remark(avg),20,y);

  doc.save(currentStudent.name+"_Result.pdf");

}

</script>
</body>
</html>
